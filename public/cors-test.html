<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>CORS Test – hitobito</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
    h1 { font-size: 1.2rem; }
    .test { background: white; border-radius: 8px; padding: 1rem; margin: 1rem 0; border-left: 4px solid #ccc; }
    .test.ok { border-color: #2a7d2a; }
    .test.fail { border-color: #c00; }
    .test.running { border-color: #888; }
    .label { font-weight: bold; margin-bottom: .4rem; }
    .detail { font-size: .85rem; color: #444; white-space: pre-wrap; }
    button { padding: .5rem 1.2rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>CORS Test – jubla.puzzle.ch</h1>
  <p>Testet ob der hitobito-Server CORS-Requests von dieser Origin erlaubt.</p>
  <button onclick="runAll()">Tests starten</button>
  <div id="results"></div>

  <script>
    const HITOBITO = 'https://jubla.puzzle.ch'

    function render(id, label, state, detail) {
      let el = document.getElementById(id)
      if (!el) {
        el = document.createElement('div')
        el.id = id
        el.className = 'test'
        document.getElementById('results').appendChild(el)
      }
      el.className = `test ${state}`
      el.innerHTML = `<div class="label">${label}</div><div class="detail">${detail}</div>`
    }

    async function test(id, label, fn) {
      render(id, label, 'running', 'läuft…')
      try {
        const result = await fn()
        render(id, label, 'ok', result)
      } catch (e) {
        render(id, label, 'fail', e.message)
      }
    }

    async function runAll() {
      document.getElementById('results').innerHTML = ''

      // 1. GET /oauth/profile – kein Preflight, testet ob der Server CORS-Header setzt
      await test('t1', 'GET /oauth/profile (kein Token → 401, aber CORS-Header sollte da sein)', async () => {
        const res = await fetch(`${HITOBITO}/oauth/profile`, {
          headers: { Authorization: 'Bearer invalid', Accept: 'application/json' }
        })
        const cors = res.headers.get('access-control-allow-origin')
        return `HTTP ${res.status}\nAccess-Control-Allow-Origin: ${cors ?? '(fehlt!)'}`
      })

      // 2. OPTIONS preflight auf /api/social_accounts – das ist der eigentliche Fehler
      await test('t2', 'OPTIONS preflight → /api/social_accounts', async () => {
        const res = await fetch(`${HITOBITO}/api/social_accounts`, {
          method: 'OPTIONS',
          headers: {
            'Access-Control-Request-Method': 'POST',
            'Access-Control-Request-Headers': 'authorization,content-type,accept',
            Origin: window.location.origin,
          }
        })
        const allowOrigin = res.headers.get('access-control-allow-origin')
        const allowMethods = res.headers.get('access-control-allow-methods')
        const allowHeaders = res.headers.get('access-control-allow-headers')
        return `HTTP ${res.status}
Access-Control-Allow-Origin:  ${allowOrigin ?? '(fehlt!)'}
Access-Control-Allow-Methods: ${allowMethods ?? '(fehlt!)'}
Access-Control-Allow-Headers: ${allowHeaders ?? '(fehlt!'}`
      })

      // 3. POST /api/social_accounts – echter Request (schlägt mit 401 fehl, aber CORS muss passen)
      await test('t3', 'POST /api/social_accounts (kein Token → 401, aber CORS-Header sollte da sein)', async () => {
        const res = await fetch(`${HITOBITO}/api/social_accounts`, {
          method: 'POST',
          headers: {
            Authorization: 'Bearer invalid',
            'Content-Type': 'application/vnd.api+json',
            Accept: 'application/vnd.api+json',
          },
          body: JSON.stringify({ data: { type: 'social_accounts' } })
        })
        const cors = res.headers.get('access-control-allow-origin')
        return `HTTP ${res.status}\nAccess-Control-Allow-Origin: ${cors ?? '(fehlt!)'}`
      })

      // 4. OPTIONS preflight auf /api/groups/:id
      await test('t4', 'OPTIONS preflight → /api/groups/1', async () => {
        const res = await fetch(`${HITOBITO}/api/groups/1`, {
          method: 'OPTIONS',
          headers: {
            'Access-Control-Request-Method': 'GET',
            'Access-Control-Request-Headers': 'authorization,accept',
            Origin: window.location.origin,
          }
        })
        const allowOrigin = res.headers.get('access-control-allow-origin')
        const allowMethods = res.headers.get('access-control-allow-methods')
        return `HTTP ${res.status}
Access-Control-Allow-Origin:  ${allowOrigin ?? '(fehlt!)'}
Access-Control-Allow-Methods: ${allowMethods ?? '(fehlt!'}`
      })
    }
  </script>
</body>
</html>
